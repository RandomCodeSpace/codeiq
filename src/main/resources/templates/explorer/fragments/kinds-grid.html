<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">
    <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-semibold">Node Kinds</h2>
        <span class="text-sm text-muted dark:text-muted-dark"
              th:if="${kinds != null}"
              th:text="${kinds['total'] + ' total nodes'}">0 total nodes</span>
    </div>

    <div th:if="${kinds != null}" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
        <div th:each="kindEntry, iterStat : ${kinds['kinds']}"
             th:attr="style='animation-delay: ' + ${iterStat.index * 30} + 'ms'"
             class="group bg-card dark:bg-card-dark rounded-lg border border-slate-200 dark:border-slate-700 hover:border-brand-300 dark:hover:border-brand-600 hover:shadow-md transition-all duration-200 animate-slide-up overflow-hidden">

            <div class="h-1 bg-gradient-to-r"
                 th:classappend="${kindEntry['kind'] == 'endpoint' ? 'from-emerald-400 to-emerald-600' :
                                   kindEntry['kind'] == 'class' ? 'from-blue-400 to-blue-600' :
                                   kindEntry['kind'] == 'method' ? 'from-violet-400 to-violet-600' :
                                   kindEntry['kind'] == 'entity' ? 'from-amber-400 to-amber-600' :
                                   kindEntry['kind'] == 'repository' ? 'from-rose-400 to-rose-600' :
                                   kindEntry['kind'] == 'config_file' ? 'from-slate-400 to-slate-600' :
                                   kindEntry['kind'] == 'module' ? 'from-cyan-400 to-cyan-600' :
                                   'from-slate-400 to-slate-500'}"></div>

            <div class="p-4">
                <div class="flex items-center justify-between mb-3">
                    <h3 class="font-semibold text-sm capitalize" th:text="${kindEntry['kind']}">kind</h3>
                    <span class="text-xs font-mono bg-slate-100 dark:bg-slate-800 px-2 py-0.5 rounded-full"
                          th:text="${kindEntry['count']}">0</span>
                </div>
                <div class="flex gap-2">
                    <a th:href="@{/ui/kinds/{kind}(kind=${kindEntry['kind']})}"
                       class="flex-1 text-center text-xs font-medium px-3 py-1.5 rounded-md bg-brand-50 dark:bg-brand-900/30 text-brand-600 dark:text-brand-400 hover:bg-brand-100 dark:hover:bg-brand-900/50 transition-colors">
                        Explore
                    </a>
                    <button th:attr="hx-get='/ui/fragments/nodes/' + ${kindEntry['kind']}"
                            hx-target="#content"
                            hx-swap="innerHTML"
                            class="text-xs font-medium px-3 py-1.5 rounded-md text-muted dark:text-muted-dark hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                        Quick View
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
