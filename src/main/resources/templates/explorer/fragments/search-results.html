<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="content">

    <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-3">
            <button hx-get="/ui/fragments/kinds" hx-target="#content" hx-swap="innerHTML"
                    class="text-sm text-brand-600 dark:text-brand-400 hover:underline flex items-center gap-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
                All Kinds
            </button>
            <h2 class="text-lg font-semibold">
                Search: <span class="text-muted dark:text-muted-dark" th:text="${query}">query</span>
            </h2>
        </div>
        <span class="text-sm text-muted dark:text-muted-dark"
              th:text="${#lists.size(results)} + ' results'">0 results</span>
    </div>

    <div th:if="${results != null and !results.isEmpty()}" class="space-y-3">
        <div th:each="node, iterStat : ${results}"
             th:attr="style='animation-delay: ' + ${iterStat.index * 20} + 'ms'"
             class="bg-card dark:bg-card-dark rounded-lg border border-slate-200 dark:border-slate-700 hover:border-brand-300 dark:hover:border-brand-600 p-4 transition-all duration-200 animate-slide-up">

            <div class="flex items-start justify-between gap-4">
                <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2 mb-1">
                        <a th:href="@{/ui/node/{id}(id=${node['id']})}"
                           class="font-medium text-brand-600 dark:text-brand-400 hover:underline truncate"
                           th:text="${node['label']}">label</a>
                        <span class="text-[10px] px-1.5 py-0.5 rounded bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 capitalize"
                              th:text="${node['kind']}">kind</span>
                        <span th:if="${node['layer'] != null}"
                              class="text-[10px] px-1.5 py-0.5 rounded bg-brand-100 dark:bg-brand-900/30 text-brand-700 dark:text-brand-300 uppercase"
                              th:text="${node['layer']}">layer</span>
                    </div>
                    <div th:if="${node['file_path'] != null}" class="text-xs text-muted dark:text-muted-dark font-mono truncate"
                         th:text="${node['file_path']}">file</div>
                </div>
                <button th:attr="hx-get='/ui/fragments/detail/' + ${#uris.escapePathSegment(node['id'])}"
                        hx-target="#content" hx-swap="innerHTML"
                        class="text-xs font-medium px-3 py-1.5 rounded-md text-muted dark:text-muted-dark hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors whitespace-nowrap">
                    Details
                </button>
            </div>
        </div>
    </div>

    <div th:if="${results == null or results.isEmpty()}" class="text-center py-12">
        <svg class="mx-auto w-10 h-10 text-muted dark:text-muted-dark mb-3" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/>
        </svg>
        <p class="text-muted dark:text-muted-dark">No results found for "<span th:text="${query}">query</span>".</p>
    </div>
</div>
</body>
</html>
