spring:
  application:
    name: code-iq
  main:
    banner-mode: off
    allow-bean-definition-overriding: true
  threads:
    virtual:
      enabled: true
  jackson:
    deserialization:
      fail-on-unknown-properties: false
  # Neo4j runs in embedded mode — no Bolt URI needed.
  # See Neo4jConfig.java and codeiq.graph.path below.

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

codeiq:
  root-path: "."
  cache-dir: ".code-intelligence"
  graph:
    path: ".osscodeiq/graph.db"
  max-depth: 10
  max-radius: 10
  batch-size: 500

spring.ai.mcp.server:
  name: code-iq
  version: 0.1.0
  protocol: STREAMABLE
  streamable-http:
    mcp-endpoint: /mcp

---
spring:
  config:
    activate:
      on-profile: indexing
  main:
    lazy-initialization: true
  autoconfigure:
    exclude:
      - org.springframework.ai.mcp.server.webmvc.autoconfigure.McpServerStreamableHttpWebMvcAutoConfiguration
      - org.springframework.ai.mcp.server.common.autoconfigure.annotations.McpServerAnnotationScannerAutoConfiguration

codeiq:
  neo4j:
    enabled: false

---
spring:
  config:
    activate:
      on-profile: serving
  main:
    log-startup-info: false
  cache:
    type: simple

logging:
  level:
    # Suppress noisy startup warnings from Spring AI MCP internals
    org.springframework.ai.mcp: WARN
    # Suppress "Bean not eligible for BeanPostProcessors" INFO noise
    org.springframework.context.support.PostProcessorRegistrationDelegate: WARN

management:
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

codeiq:
  neo4j:
    enabled: true
