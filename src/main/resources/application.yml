spring:
  application:
    name: code-iq
  profiles:
    active: indexing
  threads:
    virtual:
      enabled: true
  # Neo4j runs in embedded mode — no Bolt URI needed.
  # See Neo4jConfig.java and codeiq.graph.path below.

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

codeiq:
  root-path: "."
  cache-dir: ".code-intelligence"
  graph:
    path: ".osscodeiq/graph.db"
  max-depth: 10
  max-radius: 10

spring.ai.mcp.server:
  name: code-iq
  version: 0.1.0
  protocol: STATELESS

---
spring:
  config:
    activate:
      on-profile: indexing

---
spring:
  config:
    activate:
      on-profile: serving
  cache:
    type: hazelcast
