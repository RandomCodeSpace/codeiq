spring:
  application:
    name: code-iq
  profiles:
    active: indexing
  threads:
    virtual:
      enabled: true
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: password

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

codeiq:
  root-path: "."
  cache-dir: ".code-intelligence"
  max-depth: 10
  max-radius: 10

---
spring:
  config:
    activate:
      on-profile: indexing

---
spring:
  config:
    activate:
      on-profile: serving
  cache:
    type: hazelcast
