spring:
  application:
    name: code-iq
  main:
    banner-mode: off
    allow-bean-definition-overriding: false
  threads:
    virtual:
      enabled: true
  jackson:
    deserialization:
      fail-on-unknown-properties: false
  # Neo4j runs in embedded mode — no Bolt URI needed.
  # See Neo4jConfig.java and codeiq.graph.path below.

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

# Runtime codeiq.* values (cache dir, limits, pipeline tuning, MCP auth, etc.)
# are sourced from codeiq.yml / env / CLI via CodeIqUnifiedConfig (see
# UnifiedConfigBeans.java). The keys kept here are ONLY those consumed
# directly by Spring's Environment for @ConditionalOnProperty / @Value:
#   codeiq.ui.enabled                    -> SpaController @ConditionalOnProperty
#   codeiq.neo4j.enabled                 -> Neo4jConfig @ConditionalOnProperty (profile-conditional, below)
#   codeiq.neo4j.bolt.port               -> Neo4jConfig @Value (default 7688)
#   codeiq.cors.allowed-origin-patterns  -> CorsConfig @Value (default patterns)
codeiq:
  ui:
    enabled: true

spring.ai.mcp.server:
  name: code-iq
  version: 0.1.0
  protocol: STREAMABLE
  streamable-http:
    mcp-endpoint: /mcp

---
spring:
  config:
    activate:
      on-profile: indexing
  main:
    lazy-initialization: true
  autoconfigure:
    exclude:
      - org.springframework.ai.mcp.server.webmvc.autoconfigure.McpServerStreamableHttpWebMvcAutoConfiguration
      - org.springframework.ai.mcp.server.common.autoconfigure.annotations.McpServerAnnotationScannerAutoConfiguration

codeiq:
  neo4j:
    enabled: false

---
spring:
  config:
    activate:
      on-profile: serving
  main:
    log-startup-info: false
  cache:
    type: simple

logging:
  level:
    # Suppress noisy startup warnings from Spring AI MCP internals
    org.springframework.ai.mcp: WARN
    # Suppress "Bean not eligible for BeanPostProcessors" INFO noise
    org.springframework.context.support.PostProcessorRegistrationDelegate: WARN

management:
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

codeiq:
  neo4j:
    enabled: true
