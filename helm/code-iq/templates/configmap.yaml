apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-code-iq-config
  labels:
    app: {{ .Release.Name }}-code-iq
data:
  application.yml: |
    spring:
      profiles:
        active: serving
    codeiq:
      graph:
        path: /app/data/graph.db
    management:
      endpoints:
        web:
          exposure:
            include: health,info,metrics
      endpoint:
        health:
          probes:
            enabled: true
