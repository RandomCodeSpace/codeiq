name: Java CI
on:
  push:
    branches: [main]
    paths: ['src/**', 'pom.xml']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'
      # `verify` is the enforced quality gate: it runs unit + integration tests
      # AND the spotbugs:check execution bound in pom.xml. Any of those
      # failing breaks the build.
      - run: mvn clean verify -B
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: target/surefire-reports/
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/site/jacoco/
      - name: SonarCloud analysis
        if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          mvn sonar:sonar -B
          -Dsonar.projectKey=RandomCodeSpace_codeiq
          -Dsonar.organization=randomcodespace
          -Dsonar.host.url=https://sonarcloud.io
          "-Dsonar.exclusions=**/grammar/**,target/generated-sources/**"
          "-Dsonar.coverage.exclusions=**/grammar/**,target/generated-sources/**"
