# Dependabot configuration for codeiq.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Strategy:
#   * weekly cadence — keeps the noise floor low while still catching CVEs early
#   * grouped updates per ecosystem so PR fan-out stays manageable
#   * security updates fire whenever needed regardless of the weekly slot
#
# RAN-46 AC #4: Dependabot (security + version updates, weekly, grouped). Also
# enable repo-level "Dependabot security updates" via gh api (the version-updates
# below cover routine bumps; security updates are the reactive channel).

version: 2
updates:
  # ----- Maven (the codeiq application) -----
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    labels:
      - "type:dependencies"
      - "area:backend"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      spring:
        patterns:
          - "org.springframework*"
          - "org.springframework.boot:*"
          - "org.springframework.security:*"
          - "org.springframework.ai:*"
      jackson:
        patterns:
          - "com.fasterxml.jackson*"
      neo4j:
        patterns:
          - "org.neo4j:*"
          - "org.neo4j.driver:*"
      antlr:
        patterns:
          - "org.antlr:*"
      maven-plugins:
        patterns:
          - "org.apache.maven.plugins:*"
          - "org.codehaus.*"
          - "org.jacoco:*"
          - "com.github.spotbugs:*"
          - "org.owasp:*"
          - "org.sonarsource.scanner.maven:*"
          - "org.sonatype.central:*"
      test-libs:
        patterns:
          - "org.junit.jupiter:*"
          - "org.mockito:*"
          - "org.assertj:*"
          - "org.hamcrest:*"
          - "com.h2database:*"

  # ----- GitHub Actions (CI / release / security) -----
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "type:dependencies"
      - "area:ci"
    commit-message:
      prefix: "chore(actions)"
      include: "scope"
    groups:
      actions:
        patterns:
          - "*"

  # ----- Frontend (npm under src/main/frontend) -----
  - package-ecosystem: "npm"
    directory: "/src/main/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "type:dependencies"
      - "area:frontend"
    commit-message:
      prefix: "chore(frontend)"
      include: "scope"
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
      ant-design:
        patterns:
          - "antd"
          - "@ant-design/*"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
      echarts:
        patterns:
          - "echarts"
          - "echarts-for-react"
      eslint:
        patterns:
          - "eslint*"
          - "@eslint/*"
          - "@typescript-eslint/*"
      typescript:
        patterns:
          - "typescript"
          - "@types/*"
